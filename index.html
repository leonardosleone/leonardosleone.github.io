<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LeoSys Pro — L&H Vajilla</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0f14;
  --surface: #151820;
  --surface2: #1c2030;
  --surface3: #222840;
  --border: #2a3050;
  --accent: #c9a84c;
  --accent2: #e8c97a;
  --accent-glow: rgba(201,168,76,0.15);
  --text: #eef0f8;
  --text2: #8892b0;
  --text3: #4a5580;
  --danger: #e05c6a;
  --success: #52c87a;
  --info: #5ba8f5;
  --warning: #f0a048;
  --sidebar-w: 240px;
  --radius: 10px;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
}
/* ─── TEMA NEGRO (default) ─── */
[data-theme="negro"] {
  --bg: #0d0f14;
  --surface: #151820;
  --surface2: #1c2030;
  --surface3: #222840;
  --border: #2a3050;
  --accent: #c9a84c;
  --accent2: #e8c97a;
  --accent-glow: rgba(201,168,76,0.15);
  --text: #eef0f8;
  --text2: #8892b0;
  --text3: #4a5580;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
}
/* ─── TEMA GRIS ─── */
[data-theme="gris"] {
  --bg: #2b2d35;
  --surface: #33363f;
  --surface2: #3c3f4a;
  --surface3: #454857;
  --border: #555868;
  --accent: #c9a84c;
  --accent2: #e8c97a;
  --accent-glow: rgba(201,168,76,0.18);
  --text: #f0f2f8;
  --text2: #adb3c8;
  --text3: #7a8099;
  --shadow: 0 4px 24px rgba(0,0,0,0.3);
}
/* ─── TEMA CLARO ─── */
[data-theme="claro"] {
  --bg: #f0f2f7;
  --surface: #ffffff;
  --surface2: #f5f6fa;
  --surface3: #eaecf3;
  --border: #d8dce8;
  --accent: #b8912a;
  --accent2: #c9a84c;
  --accent-glow: rgba(184,145,42,0.12);
  --text: #1a1d2e;
  --text2: #4a5070;
  --text3: #9096b0;
  --shadow: 0 4px 24px rgba(0,0,0,0.1);
}
[data-theme="claro"] .btn-primary{color:#fff}
[data-theme="claro"] .btn-primary:hover{color:#fff}
[data-theme="claro"] #topbar{background:var(--surface);border-bottom:1px solid var(--border)}
[data-theme="claro"] .nav-item.active{background:rgba(184,145,42,0.1)}
[data-theme="claro"] .modal{box-shadow:0 8px 40px rgba(0,0,0,0.18)}
[data-theme="claro"] .toast{box-shadow:0 4px 20px rgba(0,0,0,0.15)}
[data-theme="claro"] .preview-doc{border:1px solid #ddd}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px;overflow:hidden}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:var(--surface)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
/* ─── LAYOUT ─── */
#app{display:flex;height:100vh;overflow:hidden}
/* ─── SIDEBAR ─── */
#sidebar{width:var(--sidebar-w);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;transition:transform .3s;z-index:100}
#sidebar-header{padding:20px 16px 12px;border-bottom:1px solid var(--border)}
#sidebar-logo{font-family:'DM Serif Display',serif;font-size:22px;color:var(--accent);letter-spacing:0.5px}
#sidebar-sub{font-size:11px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;margin-top:2px}
#sidebar-brand{font-size:11px;color:var(--text3);margin-top:6px;padding-top:6px;border-top:1px solid var(--border)}
nav{flex:1;padding:12px 8px;overflow-y:auto}
.nav-section{font-size:10px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;padding:8px 10px 4px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;color:var(--text2);font-size:13px;font-weight:500;transition:all .2s;margin-bottom:2px;border:1px solid transparent}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:var(--accent-glow);color:var(--accent);border-color:rgba(201,168,76,0.3)}
.nav-item svg{flex-shrink:0;opacity:.7}
.nav-item.active svg{opacity:1}
#sidebar-footer{padding:12px 8px;border-top:1px solid var(--border)}
/* ─── MAIN ─── */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#topbar{height:54px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;flex-shrink:0}
#menu-toggle{display:none;background:none;border:none;color:var(--text);cursor:pointer;padding:4px}
#page-title{font-family:'DM Serif Display',serif;font-size:18px;color:var(--text)}
#topbar-actions{margin-left:auto;display:flex;gap:8px;align-items:center}
.topbar-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text2);padding:6px 14px;border-radius:6px;cursor:pointer;font-size:12px;font-family:'DM Sans',sans-serif;transition:all .2s;display:flex;align-items:center;gap:6px}
.topbar-btn:hover{border-color:var(--accent);color:var(--accent)}
#content{flex:1;overflow-y:auto;padding:20px}
/* ─── CARDS ─── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px}
.card-title{font-family:'DM Serif Display',serif;font-size:16px;color:var(--accent);margin-bottom:16px;display:flex;align-items:center;gap:8px}
/* ─── FORMS ─── */
.form-grid{display:grid;gap:14px}
.form-grid-2{grid-template-columns:1fr 1fr}
.form-grid-3{grid-template-columns:1fr 1fr 1fr}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-group label{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:1px;font-weight:600}
.form-control{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:9px 12px;border-radius:7px;font-size:13px;font-family:'DM Sans',sans-serif;width:100%;transition:border-color .2s,box-shadow .2s;outline:none}
.form-control:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
.form-control option{background:var(--surface2);color:var(--text)}
textarea.form-control{resize:vertical;min-height:70px}
/* ─── BUTTONS ─── */
.btn{padding:9px 18px;border-radius:7px;border:none;font-size:13px;font-family:'DM Sans',sans-serif;font-weight:600;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:7px;letter-spacing:.3px}
.btn-primary{background:var(--accent);color:#0d0f14}
.btn-primary:hover{background:var(--accent2);transform:translateY(-1px);box-shadow:0 4px 16px rgba(201,168,76,0.3)}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{border-color:var(--accent);color:var(--accent)}
.btn-danger{background:rgba(224,92,106,0.15);color:var(--danger);border:1px solid rgba(224,92,106,0.3)}
.btn-danger:hover{background:rgba(224,92,106,0.25)}
.btn-success{background:rgba(82,200,122,0.15);color:var(--success);border:1px solid rgba(82,200,122,0.3)}
.btn-success:hover{background:rgba(82,200,122,0.25)}
.btn-info{background:rgba(91,168,245,0.15);color:var(--info);border:1px solid rgba(91,168,245,0.3)}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-xs{padding:3px 8px;font-size:11px}
/* ─── TABLE ─── */
.table-wrapper{overflow-x:auto;border-radius:var(--radius);border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:13px}
thead tr{background:var(--surface2)}
thead th{padding:11px 14px;text-align:left;color:var(--text2);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid var(--border);white-space:nowrap}
tbody tr{border-bottom:1px solid var(--border);transition:background .15s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--surface2)}
tbody td{padding:10px 14px;color:var(--text);vertical-align:middle}
/* ─── BADGES ─── */
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.5px}
.badge-warning{background:rgba(240,160,72,0.15);color:var(--warning);border:1px solid rgba(240,160,72,0.3)}
.badge-success{background:rgba(82,200,122,0.15);color:var(--success);border:1px solid rgba(82,200,122,0.3)}
.badge-info{background:rgba(91,168,245,0.15);color:var(--info);border:1px solid rgba(91,168,245,0.3)}
.badge-danger{background:rgba(224,92,106,0.15);color:var(--danger);border:1px solid rgba(224,92,106,0.3)}
.badge-neutral{background:var(--surface3);color:var(--text2);border:1px solid var(--border)}
/* ─── MODAL ─── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;opacity:0;pointer-events:none;transition:opacity .25s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;transform:translateY(20px);transition:transform .25s;box-shadow:var(--shadow)}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.modal-title{font-family:'DM Serif Display',serif;font-size:18px;color:var(--accent)}
.modal-close{background:none;border:none;color:var(--text2);cursor:pointer;font-size:20px;line-height:1;padding:4px}
.modal-close:hover{color:var(--text)}
.modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
/* ─── DROPDOWN MENU ─── */
.dropdown-wrapper{position:relative;display:inline-block}
.dropdown-menu{position:absolute;top:calc(100% + 6px);right:0;background:var(--surface);border:1px solid var(--border);border-radius:10px;min-width:180px;box-shadow:var(--shadow);z-index:200;overflow:hidden;opacity:0;transform:translateY(-8px);pointer-events:none;transition:all .2s}
.dropdown-menu.open{opacity:1;transform:translateY(0);pointer-events:all}
.dropdown-item{display:flex;align-items:center;gap:8px;padding:10px 14px;cursor:pointer;color:var(--text2);font-size:13px;transition:all .15s;border:none;background:none;width:100%;text-align:left;font-family:'DM Sans',sans-serif}
.dropdown-item:hover{background:var(--surface2);color:var(--text)}
.dropdown-item.danger:hover{color:var(--danger)}
.dropdown-divider{height:1px;background:var(--border);margin:4px 0}
/* ─── ALERTS ─── */
.alert{padding:12px 16px;border-radius:8px;font-size:13px;margin-bottom:12px;display:flex;align-items:center;gap:10px}
.alert-success{background:rgba(82,200,122,0.12);border:1px solid rgba(82,200,122,0.3);color:var(--success)}
.alert-danger{background:rgba(224,92,106,0.12);border:1px solid rgba(224,92,106,0.3);color:var(--danger)}
.alert-info{background:rgba(91,168,245,0.12);border:1px solid rgba(91,168,245,0.3);color:var(--info)}
/* ─── TOAST ─── */
#toast-container{position:fixed;bottom:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 18px;font-size:13px;min-width:260px;max-width:340px;box-shadow:var(--shadow);display:flex;align-items:center;gap:10px;animation:slideIn .3s ease;border-left:3px solid var(--accent)}
.toast.success{border-left-color:var(--success)}
.toast.error{border-left-color:var(--danger)}
.toast.info{border-left-color:var(--info)}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes fadeOut{to{transform:translateX(100%);opacity:0}}
/* ─── STATS ROW ─── */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:20px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.stat-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.stat-value{font-family:'DM Serif Display',serif;font-size:28px;color:var(--accent)}
.stat-sub{font-size:11px;color:var(--text3);margin-top:2px}
/* ─── SEARCH BAR ─── */
.search-bar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:16px}
.search-input-wrap{position:relative;flex:1;min-width:180px}
.search-input-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3)}
.search-input{padding-left:34px}
/* ─── LOGO UPLOAD ─── */
.logo-upload{width:120px;height:80px;border:2px dashed var(--border);border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;overflow:hidden;transition:border-color .2s;flex-shrink:0}
.logo-upload:hover{border-color:var(--accent)}
.logo-upload img{width:100%;height:100%;object-fit:contain;position:absolute;inset:0}
.logo-upload input{position:absolute;inset:0;opacity:0;cursor:pointer}
/* ─── COTIZACION LIST ITEMS TABLE ─── */
.items-table-wrapper{border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:16px}
.items-table thead th{font-size:11px;padding:9px 10px}
.items-table tbody td{padding:7px 10px;vertical-align:middle}
.items-table .rm-btn{background:none;border:none;color:var(--text3);cursor:pointer;padding:2px 6px;font-size:16px;transition:color .2s;line-height:1}
.items-table .rm-btn:hover{color:var(--danger)}
/* ─── TOGGLE ─── */
.toggle-wrap{display:flex;align-items:center;gap:8px;cursor:pointer}
.toggle{width:38px;height:20px;background:var(--surface3);border-radius:20px;position:relative;transition:background .2s;flex-shrink:0}
.toggle.on{background:var(--accent)}
.toggle::after{content:'';width:16px;height:16px;background:#fff;border-radius:50%;position:absolute;top:2px;left:2px;transition:left .2s}
.toggle.on::after{left:20px}
/* ─── CHIPS ─── */
.chip{display:inline-flex;align-items:center;gap:4px;background:var(--surface2);border:1px solid var(--border);padding:4px 10px;border-radius:20px;font-size:12px;color:var(--text2)}
/* ─── DIVIDER ─── */
.divider{height:1px;background:var(--border);margin:16px 0}
/* ─── FIREBASE CONFIG NOTICE ─── */
.config-notice{background:rgba(201,168,76,0.1);border:1px solid rgba(201,168,76,0.3);border-radius:10px;padding:16px;margin-bottom:20px}
.config-notice h4{color:var(--accent);font-size:13px;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.config-notice p{color:var(--text2);font-size:12px;line-height:1.7}
.config-notice code{background:var(--surface2);padding:2px 6px;border-radius:4px;color:var(--accent2);font-size:11px}
/* ─── MOBILE ─── */
@media(max-width:768px){
  #sidebar{position:fixed;top:0;left:0;height:100%;transform:translateX(-100%);z-index:500}
  #sidebar.open{transform:translateX(0)}
  #menu-toggle{display:block}
  #app{overflow:visible}
  #main{overflow:hidden;height:100vh}
  .form-grid-2,.form-grid-3{grid-template-columns:1fr}
  .stats-row{grid-template-columns:1fr 1fr}
  #content{padding:14px}
  .search-bar{gap:8px}
  table{min-width:600px}
  .modal{padding:16px}
  #sidebar-overlay{display:block}
}
#sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:400}
/* hide native number spinners inside items table */
.items-table input[type=number]::-webkit-inner-spin-button,
.items-table input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
.items-table input[type=number]{-moz-appearance:textfield}
/* ─── LOGIN SCREEN ─── */
#login-screen{position:fixed;inset:0;background:var(--bg);z-index:9000;display:flex;align-items:center;justify-content:center;padding:20px}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:40px 36px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,0.5)}
.login-logo{font-family:'DM Serif Display',serif;font-size:32px;color:var(--accent);text-align:center;margin-bottom:4px}
.login-sub{font-size:12px;color:var(--text3);text-align:center;letter-spacing:2px;text-transform:uppercase;margin-bottom:32px}
.login-divider{height:1px;background:var(--border);margin:20px 0}
.login-error{background:rgba(224,92,106,0.12);border:1px solid rgba(224,92,106,0.3);color:var(--danger);padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;display:none}
.login-btn{width:100%;padding:12px;font-size:14px;border-radius:9px;margin-top:8px}
.login-footer{text-align:center;margin-top:20px;font-size:11px;color:var(--text3)}
/* topbar user badge */
#user-badge{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text2)}
#logout-btn{background:none;border:1px solid var(--border);color:var(--text3);padding:5px 12px;border-radius:6px;cursor:pointer;font-size:12px;font-family:'DM Sans',sans-serif;transition:all .2s}
#logout-btn:hover{border-color:var(--danger);color:var(--danger)}
@media print{
  body{background:white;color:#000;font-size:12pt}
  #sidebar,#topbar,#toast-container,.no-print{display:none!important}
  #content{padding:0}
  .card{border:1px solid #ddd;background:white;page-break-inside:avoid}
  .print-header{display:flex!important}
  table{font-size:10pt}
  .badge{background:none!important;border:1px solid #ccc;color:#000!important}
  thead tr{background:#f5f5f5!important}
}
.print-header{display:none;justify-content:space-between;align-items:flex-start;margin-bottom:20px;border-bottom:2px solid #ddd;padding-bottom:16px}
/* ─── COTIZACION PREVIEW ─── */
#preview-modal .modal{max-width:780px}
.preview-doc{background:white;color:#222;padding:28px;border-radius:8px;font-size:12px;line-height:1.6}
.preview-doc table{width:100%;border-collapse:collapse}
.preview-doc table th,.preview-doc table td{border:1px solid #ddd;padding:7px 10px}
.preview-doc table th{background:#f5f5f5;font-weight:700}
.preview-doc .preview-header{display:flex;justify-content:space-between;margin-bottom:20px;padding-bottom:14px;border-bottom:2px solid #333}
.preview-doc .preview-logo{max-height:70px;max-width:160px;object-fit:contain}
.preview-doc .co-title{font-size:18px;font-weight:700}
.preview-doc .preview-total-row td{font-weight:700;background:#f9f9f9}
</style>
</head>
<body>
<div id="toast-container"></div>
<div id="sidebar-overlay" onclick="closeSidebar()"></div>

<!-- ─── LOGIN SCREEN ─── -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">LeoSys Pro</div>
    <div class="login-sub">L&H · Vajilla para Eventos</div>
    <div class="login-error" id="login-error"></div>
    <div class="form-group" style="margin-bottom:14px">
      <label>Correo electrónico</label>
      <input class="form-control" type="email" id="login-email" placeholder="usuario@empresa.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label>Contraseña</label>
      <div style="position:relative">
        <input class="form-control" type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password"
          onkeydown="if(event.key==='Enter')doLogin()">
        <button onclick="togglePassVis()" type="button" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px" id="pass-eye">👁</button>
      </div>
    </div>
    <button class="btn btn-primary login-btn" onclick="doLogin()" id="login-btn">
      Ingresar al Sistema
    </button>
    <div class="login-footer">LeoSys Pro v1.0 · Sistema protegido</div>
  </div>
</div>

<div id="app" style="display:none">
<!-- ─── SIDEBAR ─── -->
<aside id="sidebar">
  <div id="sidebar-header">
    <div id="sidebar-logo">LeoSys Pro</div>
    <div id="sidebar-sub">Sistema de Gestión</div>
    <div id="sidebar-brand">L&H Vajilla para Eventos</div>
  </div>
  <nav>
    <div class="nav-section">Menú Principal</div>
    <div class="nav-item active" onclick="navigate('dashboard')" id="nav-dashboard">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      Dashboard

// LOCAL STORAGE FALLBACK (cuando Firebase no está configurado)
// ════════════════════════════════════════════════════════════
const LS = {
  get: (k, def=[]) => { try { return JSON.parse(localStorage.getItem('leosys_'+k)) ?? def; } catch{ return def; }},
  set: (k, v) => localStorage.setItem('leosys_'+k, JSON.stringify(v)),
};

// ════════════════════════════════════════════════════════════
// DATABASE ABSTRACTION
// ════════════════════════════════════════════════════════════
const DB = {
  async getAll(col) {
    if (firebaseReady) {
      const snap = await db.collection(col).get();
      return snap.docs.map(d => ({id: d.id, ...d.data()}));
    }
    return LS.get(col, []);
  },
  async save(col, doc) {
    if (firebaseReady) {
      if (doc.id) { await db.collection(col).doc(doc.id).set(doc); return doc; }
      const ref = await db.collection(col).add(doc);
      return {...doc, id: ref.id};
    }
    const arr = LS.get(col, []);
    if (doc.id) {
      const i = arr.findIndex(x => x.id === doc.id);
      if (i>=0) arr[i]=doc; else arr.push(doc);
    } else {
      doc.id = Date.now().toString(36)+Math.random().toString(36).slice(2,6);
      arr.push(doc);
    }
    LS.set(col, arr);
    return doc;
  },
  async delete(col, id) {
    if (firebaseReady) { await db.collection(col).doc(id).delete(); return; }
    const arr = LS.get(col, []).filter(x => x.id !== id);
    LS.set(col, arr);
  },
  async getOne(col, id) {
    if (firebaseReady) {
      const doc = await db.collection(col).doc(id).get();
      return doc.exists ? {id: doc.id, ...doc.data()} : null;
    }
    return LS.get(col, []).find(x => x.id === id) || null;
  }
};

function toast(msg, type='success', dur=3500) {
  const icons = {success:'✓',error:'✕',info:'ℹ'};
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<span style="font-size:16px">${icons[type]||'•'}</span> ${msg}`;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => { el.style.animation='fadeOut .4s ease forwards'; setTimeout(()=>el.remove(),400); }, dur);
}

function showModal(html, id='main-modal', maxWidth='600px') {
  const prev = document.getElementById(id);
  if (prev) prev.remove();
  const ov = document.createElement('div');
  ov.className='modal-overlay'; ov.id=id;
  ov.innerHTML=`<div class="modal" style="max-width:${maxWidth}">${html}</div>`;
  ov.addEventListener('click', e => { if(e.target===ov) closeModal(id); });
  // Evitar que clicks dentro del modal cierren dropdowns globales
  ov.addEventListener('click', e => e.stopPropagation());
  document.getElementById('modal-container').appendChild(ov);
  requestAnimationFrame(() => ov.classList.add('open'));
}
function closeModal(id='main-modal') {
  const ov = document.getElementById(id);
  if (ov) { ov.classList.remove('open'); setTimeout(()=>ov.remove(),300); }
}

function fmt(n) { return parseFloat(n||0).toLocaleString('es-AR',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtDate(d) { if(!d) return ''; const dt=new Date(d+'T12:00:00'); return dt.toLocaleDateString('es-AR'); }
function today() { return new Date().toISOString().split('T')[0]; }
function nextNum(arr, field='numero') {
  if (!arr.length) return '000001';
  const max = Math.max(...arr.map(x=>parseInt(x[field]||0)));
  return String(max+1).padStart(6,'0');
}
function restoreFocus(el) {
  // Después de re-renderizar, restaurar foco y posición del cursor en el input de búsqueda
  const id = el?.id || window._lastFocus;
  if (!id) return;
  const val = el?.value || '';
  requestAnimationFrame(function() {
    const found = document.getElementById(id);
    if (found) {
      found.focus();
      const len = found.value ? found.value.length : 0;
      try { found.setSelectionRange(len, len); } catch(e) {}
    }
  });
}

function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function dropdown(btnHTML, items, alignRight=true) {
  const id = 'dd_'+Math.random().toString(36).slice(2,8);
  document.addEventListener('click', function handler(e) {
    const menu = document.getElementById(id);
    if (menu && !menu.closest('.dropdown-wrapper').contains(e.target)) {
      menu.classList.remove('open'); document.removeEventListener('click',handler);
    }
  }, true);
  return `<div class="dropdown-wrapper">
    <button class="btn btn-secondary btn-sm" onclick="document.getElementById('${id}').classList.toggle('open');event.stopPropagation()">${btnHTML}</button>
    <div class="dropdown-menu ${alignRight?'':'left'}" id="${id}" style="${alignRight?'':'left:0;right:auto'}">
      ${items.map(it => it === 'divider' ? '<div class="dropdown-divider"></div>' :
        `<button class="dropdown-item ${it.danger?'danger':''}" onclick="closeDD('${id}');(${it.fn})()">${it.icon||''} ${it.label}</button>`
      ).join('')}
    </div>
  </div>`;
}
function closeDD(id) { document.getElementById(id)?.classList.remove('open'); }

function renderArticulos() {
  const filtered = articulosList.filter(a =>
    !articuloSearch ||

    a.descripcion?.toLowerCase().includes(articuloSearch) ||

  ).sort((a, b) => {
    const r = (a.rubro||'').localeCompare(b.rubro||'', 'es', {sensitivity:'base'});

    return (a.descripcion||'').localeCompare(b.descripcion||'', 'es', {sensitivity:'base'});

  // Deduplicar rubros ignorando mayúsculas/minúsculas
  const rubrosMap2 = {};

// Normaliza el rubro: primera letra mayúscula, resto sin cambiar, trim
function normalizeRubro(r) {
  const s = String(r||'').trim();
  if (!s) return s;
  return s.charAt(0).toUpperCase() + s.slice(1);
}

async function saveArticulo(id) {
  const rubro = normalizeRubro(document.getElementById('art-rubro').value.trim());
  const codigo = document.getElementById('art-codigo').value.trim();
  const descripcion = document.getElementById('art-desc').value.trim();
  const precio = parseFloat(document.getElementById('art-precio').value) || 0;
  const iva = document.getElementById('art-iva-toggle').classList.contains('on');
  if (!descripcion) { toast('La descripción es obligatoria','error'); return; }
  const doc = { rubro, codigo, descripcion, precio, iva };
  if (id) doc.id = id;
  await DB.save('articulos', doc);
  articulosList = await DB.getAll('articulos');
  closeModal();
  renderArticulos();
  toast('Artículo guardado');
}

async function deleteArticulo(id) {
  if (!confirm('¿Eliminar este artículo?')) return;
  await DB.delete('articulos', id);
  articulosList = articulosList.filter(a=>a.id!==id);
  renderArticulos();
  toast('Artículo eliminado','info');
}

async function normalizarRubros() {
  let fixed = 0;
  for (const art of articulosList) {
    const norm = normalizeRubro(art.rubro);
    if (norm !== art.rubro) {
      await DB.save('articulos', {...art, rubro: norm});
      fixed++;
    }
  }
  articulosList = await DB.getAll('articulos');
  renderArticulos();
  if (fixed > 0) toast(`${fixed} artículo(s) normalizados correctamente`);
  else toast('Los rubros ya estaban correctamente capitalizados', 'info');
}

async function eliminarInventario() {
  if (articulosList.length === 0) {
    toast('El inventario ya está vacío','info');
    return;
  }
  showModal(`

async function confirmarEliminarInventario() {
  const btn = document.getElementById('btn-confirmar-eliminar');
  btn.textContent = 'Eliminando...';
  btn.disabled = true;
  try {
    for (const art of articulosList) {
      await DB.delete('articulos', art.id);
    }
    articulosList = [];
    closeModal();
    renderArticulos();
    toast(`Inventario eliminado correctamente`, 'info');
  } catch(e) {
    toast('Error al eliminar: ' + e.message, 'error');

  }

function importExcelArticulos() {
  const inp = document.createElement('input');
  inp.type='file'; inp.accept='.xlsx,.xls,.csv';
  inp.onchange = async e => {
    const file = e.target.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = async ev => {
      try {
        const wb = XLSX.read(ev.target.result, {type:'binary'});
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, {defval:''});
        let count = 0;
        for (const row of rows) {
          const rubro = normalizeRubro(String(row['rubro']||row['Rubro']||'').trim());
          const descripcion = String(row['articulo']||row['Articulo']||row['descripcion']||row['Descripcion']||'').trim();
          const precio = parseFloat(row['precio']||row['Precio']||0);
          const ivaRaw = String(row['iva']||row['IVA']||'si').toLowerCase();
          const iva = ivaRaw!=='no'&&ivaRaw!=='0'&&ivaRaw!=='false';
          if (!descripcion) continue;
          const codigo = 'ART-'+String(Date.now()+count).slice(-6);
          await DB.save('articulos', { rubro, descripcion, precio, iva, codigo });
          count++;
        }
        articulosList = await DB.getAll('articulos');
        renderArticulos();
        toast(`${count} artículo(s) importados exitosamente`);
      } catch(err) {
        toast('Error al importar: '+err.message,'error');
      }
    };
    reader.readAsBinaryString(file);
  };
  inp.click();
}

function buscarOnline() {
  const cuit = document.getElementById('cl-cuit').value.replace(/\D/g,'');
  const statusEl = document.getElementById('arca-status');
  if (cuit.length !== 11) {
    statusEl.innerHTML = '<span style="color:var(--danger)">⚠ Ingresá los 11 dígitos sin guiones. Ej: 20123456789</span>';
    return;
  }
  // Copiar CUIT al portapapeles y abrir cuitonline.com
  navigator.clipboard.writeText(cuit).then(function() {
    statusEl.innerHTML = '<span style="color:var(--success)">📋 CUIT <strong>' + cuit + '</strong> copiado — pegalo con <strong>Ctrl+V</strong> en la página que se abrió.</span>';
  }).catch(function() {
    statusEl.innerHTML = '<span style="color:var(--text2)">Abriendo cuitonline.com — ingresá el CUIT: <strong>' + cuit + '</strong></span>';
  });
  window.open('https://www.cuitonline.com/', '_blank');
}

async function saveCliente(id, returnDoc=false) {
  const esParticular = document.getElementById('cl-particular-toggle')?.classList.contains('on') || false;
  const nombre = document.getElementById('cl-nombre').value.trim();

  // Recolectar múltiples whatsapps
  const wsEls = document.querySelectorAll('.ws-field');
  const wsList = [...wsEls].map(el=>el.value.trim()).filter(Boolean);

  // Recolectar múltiples mails
  const mailEls = document.querySelectorAll('.mail-field');
  const mails = [...mailEls].map(el=>el.value.trim()).filter(Boolean);

  if (esParticular) {
    if (!wsList.length) { toast('Para un cliente Particular, el WhatsApp es obligatorio','error'); return; }
  } else {
    if (!nombre) { toast('El nombre es obligatorio','error'); return; }
  }

  const doc = {
    nombre: nombre || (wsList[0] ? 'Particular ' + wsList[0] : 'Particular'),
    particular: esParticular,
    razonSocial: document.getElementById('cl-razon')?.value.trim() || '',
    cuit: document.getElementById('cl-cuit')?.value.trim() || '',
    mails,   // array
    wsList,  // array
    // compatibilidad con código antiguo que lee .mail y .whatsapp
    mail: mails[0] || '',
    whatsapp: wsList[0] || '',
    direccion: document.getElementById('cl-dir')?.value.trim() || '',
    condPago: document.getElementById('cl-pago')?.value || '',
    notas: document.getElementById('cl-notas')?.value.trim() || '',
    resumenCuentas: document.getElementById('cl-resumen-toggle')?.classList.contains('on') || false,
  };
  if (id) doc.id = id;
  const saved = await DB.save('clientes', doc);
  clientesList = await DB.getAll('clientes');
  if (returnDoc) return saved;
  closeModal();
  renderClientes();
  toast('Cliente guardado');
}

async function deleteCliente(id) {
  if (!confirm('¿Eliminar este cliente?')) return;
  await DB.delete('clientes', id);
  clientesList = clientesList.filter(c=>c.id!==id);
  renderClientes();
  toast('Cliente eliminado','info');
}

function renderItemsTable(articulos, rubros) {
  // Ordenar rubros y artículos alfabéticamente
  const rubrosSorted = [...rubros].sort((a,b) => a.localeCompare(b, 'es', {sensitivity:'base'}));
  const articulosSorted = [...articulos].sort((a,b) => {
    const r = (a.rubro||'').localeCompare(b.rubro||'', 'es', {sensitivity:'base'});
    if (r !== 0) return r;
    return (a.descripcion||'').localeCompare(b.descripcion||'', 'es', {sensitivity:'base'});
  });
  const rubroOpts = rubrosSorted.map(r=>`<option value="${escHtml(r)}">${escHtml(r)}</option>`).join('');
  window._articulos_cache = articulosSorted;
  window._rubros_cache = rubrosSorted;
  
  return `<div class="items-table-wrapper">
    <table class="items-table">
      <thead>
        <tr>
          <th style="width:140px">Rubro</th>
          <th>Descripción</th>
          <th style="width:160px">Color / Obs.</th>
          <th style="width:100px">Precio</th>
          <th style="width:60px">IVA</th>
          <th style="width:80px">Cantidad</th>
          <th style="width:100px">Total</th>
          <th style="width:32px"></th>
        </tr>
      </thead>
      <tbody id="items-tbody">
        ${presupItems.map((item,i) => renderItemRow(item, i, rubroOpts)).join('')}
      </tbody>
    </table>
  </div>`;
}

function renderItemRow(item={}, idx, rubroOpts) {
  rubroOpts = rubroOpts || (window._rubros_cache||[]).map(r=>`<option value="${escHtml(r)}">${escHtml(r)}</option>`).join('');
  const arts = window._articulos_cache || [];
  const descOpts = arts
    .filter(a=>!item.rubro || a.rubro?.toLowerCase()===item.rubro?.toLowerCase())
    .sort((a,b) => (a.descripcion||'').localeCompare(b.descripcion||'', 'es', {sensitivity:'base'}))
    .map(a=>`<option value="${a.id}" ${item.articuloId===a.id?'selected':''}>${escHtml(a.descripcion)}</option>`).join('');
  const total = (parseFloat(item.precio||0) * (1+(item.iva?0.21:0))) * parseFloat(item.cantidad||1);
  return `<tr id="item-row-${idx}">
    <td>
      <select class="form-control" style="font-size:12px;padding:5px 8px" onchange="onRubroChange(${idx},this.value)">
        <option value="">— Rubro —</option>
        ${rubroOpts.replace(`value="${escHtml(item.rubro)}"`,`value="${escHtml(item.rubro)}" selected`)}
      </select>
    </td>
    <td>
      <select class="form-control" style="font-size:12px;padding:5px 8px" id="desc-sel-${idx}" onchange="onDescChange(${idx},this.value)">
        <option value="">— Artículo —</option>
        ${descOpts}
      </select>
    </td>
    <td>
      <input class="form-control" style="font-size:12px;padding:5px 8px" type="text"
        placeholder="Color, talle, obs..."
        value="${escHtml(item.obs||'')}"
        id="item-obs-${idx}"
        oninput="presupItems[${idx}].obs=this.value">
    </td>
    <td style="min-width:120px">
      <div style="display:flex;align-items:center;gap:6px">
        <span style="color:var(--text2);font-size:13px;font-weight:700;flex-shrink:0">$</span>
        <input class="form-control" style="font-size:12px;padding:5px 8px;text-align:right;min-width:80px" type="number" step="0.01" min="0" value="${item.precio||''}" id="item-precio-${idx}" oninput="onItemChange(${idx})">
      </div>
    </td>
    <td style="text-align:center">
      <div class="toggle ${item.iva!==false?'on':''}" id="item-iva-${idx}" onclick="this.classList.toggle('on');onItemChange(${idx})" style="margin:0 auto"></div>
    </td>
    <td style="min-width:110px">
      <div style="display:flex;align-items:center;gap:4px;justify-content:center">
        <button type="button" onclick="stepQty(${idx},-1)" style="width:26px;height:26px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:15px;font-weight:700;cursor:pointer;line-height:1;display:flex;align-items:center;justify-content:center;flex-shrink:0">−</button>
        <input class="form-control" style="font-size:12px;padding:4px 4px;text-align:center;width:44px;flex-shrink:0" type="number" min="1" value="${item.cantidad||1}" id="item-qty-${idx}" oninput="onItemChange(${idx})">
        <button type="button" onclick="stepQty(${idx},1)" style="width:26px;height:26px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:15px;font-weight:700;cursor:pointer;line-height:1;display:flex;align-items:center;justify-content:center;flex-shrink:0">+</button>
      </div>
    </td>
    <td style="text-align:right"><strong id="item-total-${idx}">$${fmt(total)}</strong></td>
    <td><button class="items-table rm-btn" onclick="removeItem(${idx})">×</button></td>
  </tr>`;
}

function addItemRow() {
  presupItems.push({rubro:'',descripcion:'',precio:0,iva:true,cantidad:1});
  const idx = presupItems.length-1;
  const tbody = document.getElementById('items-tbody');
  if (tbody) {
    const tr = document.createElement('tr');
    tr.id = 'item-row-'+idx;
    tr.innerHTML = renderItemRow({rubro:'',iva:true,cantidad:1}, idx).replace(/^<tr[^>]*>/,'').replace(/<\/tr>$/,'');
    tbody.appendChild(tr);
  }
  calcTotales();
}

function removeItem(idx) {
  presupItems.splice(idx,1);
  const tbody = document.getElementById('items-tbody');
  if (!tbody) return;
  tbody.innerHTML = presupItems.map((item,i)=>renderItemRow(item,i)).join('');
  calcTotales();
}

function stepQty(idx, delta) {
  const el = document.getElementById('item-qty-'+idx);
  if (!el) return;
  const val = Math.max(1, (parseFloat(el.value)||1) + delta);
  el.value = val;
  onItemChange(idx);
}

function onRubroChange(idx, rubro) {
  if (!presupItems[idx]) return;
  presupItems[idx].rubro = rubro;
  presupItems[idx].articuloId = '';
  presupItems[idx].descripcion = '';
  presupItems[idx].precio = 0;
  const arts = (window._articulos_cache||[]).filter(a=>!rubro||a.rubro?.toLowerCase()===rubro.toLowerCase())
    .sort((a,b) => (a.descripcion||'').localeCompare(b.descripcion||'', 'es', {sensitivity:'base'}));
  const sel = document.getElementById('desc-sel-'+idx);
  if (sel) sel.innerHTML = '<option value="">— Artículo —</option>'+arts.map(a=>`<option value="${a.id}">${escHtml(a.descripcion)}</option>`).join('');
  calcTotales();
}

function onDescChange(idx, artId) {
  if (!presupItems[idx]) return;
  const art = (window._articulos_cache||[]).find(a=>a.id===artId);
  if (art) {
    presupItems[idx].articuloId = art.id;
    presupItems[idx].descripcion = art.descripcion;
    presupItems[idx].precio = art.precio;
    presupItems[idx].iva = art.iva !== false;
    presupItems[idx].rubro = art.rubro;
    const prEl = document.getElementById('item-precio-'+idx);
    if (prEl) prEl.value = art.precio;
    const ivaEl = document.getElementById('item-iva-'+idx);
    if (ivaEl) { ivaEl.classList.toggle('on', art.iva!==false); }
  }
  onItemChange(idx);
}

function onItemChange(idx) {
  if (!presupItems[idx]) return;
  const precio = parseFloat(document.getElementById('item-precio-'+idx)?.value)||0;
  const iva = document.getElementById('item-iva-'+idx)?.classList.contains('on');
  const qty = parseFloat(document.getElementById('item-qty-'+idx)?.value)||1;
  presupItems[idx].precio = precio;
  presupItems[idx].iva = iva;
  presupItems[idx].cantidad = qty;
  const total = precio * (1+(iva?0.21:0)) * qty;
  const totEl = document.getElementById('item-total-'+idx);
  if (totEl) totEl.textContent = '$'+fmt(total);
  calcTotales();
}

function calcTotales() {
  // Sync presupItems from DOM
  presupItems.forEach((item,i)=>{
    const prEl  = document.getElementById('item-precio-'+i);
    const ivaEl = document.getElementById('item-iva-'+i);
    const qtyEl = document.getElementById('item-qty-'+i);
    const obsEl = document.getElementById('item-obs-'+i);
    if (prEl)  item.precio   = parseFloat(prEl.value)||0;
    if (ivaEl) item.iva      = ivaEl.classList.contains('on');
    if (qtyEl) item.cantidad = parseFloat(qtyEl.value)||1;
    if (obsEl) item.obs      = obsEl.value;
  });
  
  let subtotal = 0, ivaTotal = 0;
  presupItems.forEach(item => {
    const base = (item.precio||0) * (item.cantidad||1);
    const iva = item.iva ? base * 0.21 : 0;
    subtotal += base; ivaTotal += iva;
  });
  const descPct = parseFloat(document.getElementById('pre-descuento')?.value)||0;
  const traslado = parseFloat(document.getElementById('pre-traslado')?.value)||0;
  const neto = subtotal + ivaTotal;
  const descMonto = neto * descPct / 100;
  const total = neto - descMonto;
  
  const el = document.getElementById('pre-totales');
  if (el) el.innerHTML = `
    <div style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:14px;font-size:13px">
      <div style="display:flex;justify-content:space-between;margin-bottom:6px">
        <span style="color:var(--text2)">Subtotal neto:</span>
        <span>$${fmt(subtotal)}</span>
      </div>
      <div style="display:flex;justify-content:space-between;margin-bottom:6px">
        <span style="color:var(--text2)">IVA (21%):</span>
        <span>$${fmt(ivaTotal)}</span>
      </div>
      ${descPct>0?`<div style="display:flex;justify-content:space-between;margin-bottom:6px">
        <span style="color:var(--danger)">Descuento (${descPct}%):</span>
        <span style="color:var(--danger)">-$${fmt(descMonto)}</span>
      </div>`:''}
      <div style="display:flex;justify-content:space-between;border-top:1px solid var(--border);margin-top:8px;padding-top:8px">
        <span style="font-weight:700;font-size:15px">TOTAL:</span>
        <span style="font-weight:700;font-size:15px;color:var(--accent)">$${fmt(total)}</span>
      </div>
    </div>`;
  return { subtotal, ivaTotal, descMonto, total, descPct };
}

function autoFillCliente(clienteId, overrides={}) {
  const c = clientesList.find(x=>x.id===clienteId) || {};
  const pagoEl = document.getElementById('pre-pago');
  const dirEl = document.getElementById('pre-dir');
  if (pagoEl && c.condPago && !overrides.condPago) pagoEl.value = c.condPago;
  if (dirEl && c.direccion && !overrides.direccionEnvio) dirEl.value = c.direccion;
}

// El modal de "Nuevo Cliente" desde Presupuestos reutiliza exactamente
// el mismo formulario completo que el módulo Clientes.
function openClienteRapido() {
  openClienteModal(null);
  // Sobreescribir el botón Guardar para que, además de guardar,
  // seleccione el cliente recién creado en el presupuesto.
  setTimeout(() => {
    const modal = document.getElementById('main-modal');
    if (!modal) return;
    const saveBtn = modal.querySelector('.modal-footer .btn-primary');
    if (saveBtn) saveBtn.setAttribute('onclick', "saveClienteRapido('')");
  }, 0);
}

async function saveClienteRapido(id) {
  const saved = await saveCliente(id, true);
  if (!saved) return;
  closeModal();
  // Reload presupuesto select
  await PAGES.presupuestos();
  setTimeout(()=>{
    const sel = document.getElementById('pre-cliente');
    if (sel) { sel.value = saved.id; autoFillCliente(saved.id); }
  },100);
  toast('Cliente creado y seleccionado');
}

function collectPresupData() {
  // Sync items from DOM
  presupItems.forEach((item,i)=>{
    const prEl = document.getElementById('item-precio-'+i);
    const ivaEl = document.getElementById('item-iva-'+i);
    const qtyEl = document.getElementById('item-qty-'+i);
    const descEl = document.getElementById('desc-sel-'+i);
    if (prEl) item.precio = parseFloat(prEl.value)||0;
    if (ivaEl) item.iva = ivaEl.classList.contains('on');
    if (qtyEl) item.cantidad = parseFloat(qtyEl.value)||1;
    if (descEl) {
      const art = (window._articulos_cache||[]).find(a=>a.id===descEl.value);
      if (art) { item.descripcion = art.descripcion; item.articuloId = art.id; item.rubro = art.rubro; }
    }
  });
  
  const tots = calcTotales();
  const clienteId = document.getElementById('pre-cliente')?.value;
  const cliente = clientesList.find(c=>c.id===clienteId);
  
  return {
    fecha: document.getElementById('pre-fecha')?.value || today(),
    numero: document.getElementById('pre-numero')?.value,
    clienteId,
    clienteNombre:    cliente?.nombre        || '',
    clienteRazon:     cliente?.razonSocial   || '',
    clienteCuit:      cliente?.cuit          || '',
    clienteParticular: cliente?.particular   || false,
    clienteMail:  cliente?.mail      || '',
    clienteWs:    cliente?.whatsapp  || '',
    clienteMails:  cliente?.mails?.length  ? cliente.mails  : (cliente?.mail     ? [cliente.mail]     : []),
    clienteWsList: cliente?.wsList?.length ? cliente.wsList : (cliente?.whatsapp ? [cliente.whatsapp] : []),
    condPago: document.getElementById('pre-pago')?.value || 'Efectivo',
    fechaEntrega: document.getElementById('pre-fentrega')?.value || '',
    fechaRetiro: document.getElementById('pre-fretiro')?.value || '',
    direccionEnvio: document.getElementById('pre-dir')?.value || '',
    items: [...presupItems],
    subtotal: tots.subtotal,
    ivaTotal: tots.ivaTotal,
    descuento: tots.descPct,
    descuentoMonto: tots.descMonto,
    traslado: traslado,
    total: tots.total,
    nota: document.getElementById('pre-nota')?.value || '',
    notaPrivada: document.getElementById('pre-notapriv')?.value || '',
    estado: 'en_espera',

  };
}

async function abrirPanelEnvio(modo) {
  // Si no necesita selección de contactos, ejecutar directo
  if (modo === 'solo' || modo === 'print') {
    const data = collectPresupData();
    if (!data.clienteId) { toast('Seleccioná un cliente', 'error'); return; }
    if (data.items.length === 0) { toast('Agregá al menos un artículo', 'error'); return; }
    await ejecutarCotizacion(data, modo, [], []);
    return;
  }

  const data = collectPresupData();
  if (!data.clienteId) { toast('Seleccioná un cliente', 'error'); return; }
  if (data.items.length === 0) { toast('Agregá al menos un artículo', 'error'); return; }

  // Recargar cliente fresco desde DB
  const clientesFresh = await DB.getAll('clientes');
  const clienteId = data.clienteId;
  
  // Buscar por id exacto o por cualquier variante
  let cf = clientesFresh.find(c => c.id === clienteId);
  if (!cf) cf = clientesFresh.find(c => String(c.id) === String(clienteId));
  if (!cf) cf = {};

  const mails  = Array.isArray(cf.mails)  && cf.mails.length  ? cf.mails  : (cf.mail      ? [cf.mail]      : []);
  const wsList = Array.isArray(cf.wsList) && cf.wsList.length ? cf.wsList : (cf.whatsapp  ? [cf.whatsapp]  : []);

  data.clienteMails  = mails;
  data.clienteWsList = wsList;
  data.clienteMail   = cf.mail      || '';
  data.clienteWs     = cf.whatsapp  || '';

  window._panelData = data;
  window._panelModo = modo;
  window._panelMails  = mails;
  window._panelWsList = wsList;

  const needsMail = modo === 'mail' || modo === 'mailws';
  const needsWs   = modo === 'ws'   || modo === 'mailws';

  // Construir panel HTML con string concat pura
  var html = '';
  html += '<div class="card" style="border:2px solid var(--accent)">';
  html += '<div class="card-title">📤 Seleccionar Destinatarios — ' + escHtml(cf.nombre || data.clienteNombre) + '</div>';

  if (needsMail) {
    html += '<div style="margin-bottom:16px">';
    html += '<div style="font-size:12px;font-weight:700;color:var(--info);margin-bottom:8px;text-transform:uppercase;letter-spacing:1px">📧 Direcciones de Mail</div>';
    if (mails.length === 0) {
      html += '<div style="color:var(--text3);font-size:13px;padding:10px;background:var(--surface2);border-radius:7px">Sin mails cargados para este cliente.</div>';
    } else {
      for (var i = 0; i < mails.length; i++) {
        html += '<label style="display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:8px;background:var(--surface2);border:1px solid var(--border);margin-bottom:6px;cursor:pointer">';
        html += '<input type="checkbox" id="pnl-mail-' + i + '" checked style="width:18px;height:18px;accent-color:var(--info);cursor:pointer">';
        html += '<span style="font-size:14px">' + escHtml(mails[i]) + '</span>';
        html += '</label>';
      }
    }
    html += '</div>';
  }

  if (needsWs) {
    html += '<div style="margin-bottom:16px">';
    html += '<div style="font-size:12px;font-weight:700;color:var(--success);margin-bottom:8px;text-transform:uppercase;letter-spacing:1px">💬 Números de WhatsApp</div>';
    if (wsList.length === 0) {
      html += '<div style="color:var(--text3);font-size:13px;padding:10px;background:var(--surface2);border-radius:7px">Sin números cargados para este cliente.</div>';
    } else {
      for (var j = 0; j < wsList.length; j++) {
        html += '<label style="display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:8px;background:var(--surface2);border:1px solid var(--border);margin-bottom:6px;cursor:pointer">';
        html += '<input type="checkbox" id="pnl-ws-' + j + '" checked style="width:18px;height:18px;accent-color:var(--success);cursor:pointer">';
        html += '<span style="font-size:14px">' + escHtml(wsList[j]) + '</span>';
        html += '</label>';
      }
    }
    html += '</div>';
  }

  html += '<div style="display:flex;gap:10px;margin-top:4px">';
  html += '<button class="btn btn-secondary" onclick="cerrarPanelEnvio()">Cancelar</button>';
  html += '<button class="btn btn-primary" onclick="confirmarPanelEnvio()">✓ Confirmar y Enviar</button>';
  html += '</div>';
  html += '</div>';

  // Eliminar panel anterior si existe
  var oldPanel = document.getElementById('panel-envio');
  if (oldPanel) oldPanel.remove();

  // Crear panel y agregarlo al content
  var panel = document.createElement('div');
  panel.id = 'panel-envio';
  panel.innerHTML = html;
  var content = document.getElementById('content');
  if (content) {
    content.appendChild(panel);
    panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
  } else {
    document.body.appendChild(panel);
  }
}

function cerrarPanelEnvio() {
  var panel = document.getElementById('panel-envio');
  if (panel) panel.remove();
}

async function confirmarPanelEnvio() {
  var data   = window._panelData;
  var modo   = window._panelModo;
  var mails  = window._panelMails  || [];
  var wsList = window._panelWsList || [];

  if (!data) { toast('Error: datos perdidos', 'error'); return; }

  var needsMail = modo === 'mail' || modo === 'mailws';
  var needsWs   = modo === 'ws'   || modo === 'mailws';
  var mailsSel  = [];
  var wsSel     = [];

  // Leer checkboxes ANTES de cerrar el panel
  if (needsMail) {
    for (var i = 0; i < mails.length; i++) {
      var cb = document.getElementById('pnl-mail-' + i);
      if (cb && cb.checked) mailsSel.push(String(mails[i]));
    }
  }
  if (needsWs) {
    for (var j = 0; j < wsList.length; j++) {
      var cw = document.getElementById('pnl-ws-' + j);
      if (cw && cw.checked) wsSel.push(String(wsList[j]));
    }
  }

  // Cerrar panel DESPUÉS de leer los valores
  cerrarPanelEnvio();
  await ejecutarCotizacion(data, modo, mailsSel, wsSel);
}

// Mantener crearCotizacion como alias para compatibilidad con otras partes del código
async function crearCotizacion(modo) {
  await abrirPanelEnvio(modo);
}

async function ejecutarCotizacion(data, modo, mailsSel, wsSel) {
  if (presupEditId) data.id = presupEditId;
  const saved = await DB.save('cotizaciones', data);
  const enviado = [];

  // ── SOLO: si es edición, regenerar PDF automáticamente ──
  if (modo === 'solo' && presupEditId) {
    toast('Cotización actualizada. Generando PDF...', 'info', 3000);
    const blob = await generarPDFBlob(data);
    if (blob) {
      const nombreArchivo = 'Cotizacion-' + data.numero + '-' + (data.clienteNombre||'cliente').replace(/\s+/g,'-') + '.pdf';
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = nombreArchivo;
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      setTimeout(function(){ URL.revokeObjectURL(url); }, 3000);
    }
  }

  // ── MAIL ──
  if (mailsSel && mailsSel.length) {
    await enviarMail({...data, clienteMails: mailsSel});
    enviado.push('mail');
  }

  toast('Cotización guardada. Procesando envíos...', 'info', 3000);

  // ── WHATSAPP: generar PDF, luego mostrar panel paso a paso ──
  if (wsSel && wsSel.length) {
    toast('Generando PDF...', 'info', 30000);
    const blob = await generarPDFBlob(data);
    if (blob) {
      // Descargar PDF una sola vez
      const nombreArchivo = 'Cotizacion-' + data.numero + '-' + (data.clienteNombre||'cliente').replace(/\s+/g,'-') + '.pdf';
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = nombreArchivo;
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      setTimeout(function(){ URL.revokeObjectURL(url); }, 3000);
      // Armar mensaje
      const perfil = getPerfilSync();
      const wsTpl = perfil.wsMensaje ||
        'Hola {cliente}! 👋\nTe enviamos la cotización *#{numero}* por *{total}*.\n\n{nota}\n📎 Adjunto encontrará el PDF.\n\n_{empresa}_';
      const msg = encodeURIComponent(interpolateMsg(wsTpl, data, perfil));
      // Guardar en global y mostrar panel paso a paso
      window._wsPasos = wsSel.map(function(n){ return n.replace(/\D/g,''); }).filter(Boolean);
      window._wsMsg   = msg;
      window._wsStep  = 0;
      mostrarPanelWsSteps();
    }
    enviado.push('whatsapp');
  }

  if (modo === 'print') setTimeout(function(){ imprimirCotizacion(data); }, 400);
  if (enviado.length) await DB.save('cotizaciones', {...saved, enviado});

  if (!(wsSel && wsSel.length)) {
    toast('Cotización ' + data.numero + ' creada exitosamente!');
    presupItems = [];
    presupEditId = null;
    navigate('cotizaciones');
  } else {
    toast('Cotización ' + data.numero + ' guardada. Enviá los WhatsApps con los botones de abajo.');
    presupItems = [];
    presupEditId = null;
  }
}

// ── Reemplaza variables en el template del mensaje ──
// ── Panel paso a paso para WhatsApp ──
function mostrarPanelWsSteps() {
  var pasos = window._wsPasos || [];
  var step  = window._wsStep  || 0;
  var msg   = window._wsMsg   || '';
  var total = pasos.length;

  if (step >= total) {
    var panel = document.getElementById('panel-ws-steps');
    if (panel) panel.remove();
    toast('✓ WhatsApp enviado a ' + total + ' destinatario(s)', 'success', 5000);
    var dest = window._wsNavDestino || 'cotizaciones';
    window._wsNavDestino = null;
    navigate(dest);
    return;
  }

  var num = pasos[step];
  var html = '';
  html += '<div class="card" style="border:2px solid var(--success);margin-top:16px">';
  html += '<div class="card-title" style="color:var(--success)">💬 Envío por WhatsApp — ' + (step+1) + ' de ' + total + '</div>';
  html += '<div style="margin-bottom:14px">';
  for (var i = 0; i < pasos.length; i++) {
    var done = i < step;
    var curr = i === step;
    html += '<div style="display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:7px;margin-bottom:5px;';
    html += 'background:' + (curr?'rgba(82,200,122,0.12)':done?'var(--surface3)':'var(--surface2)') + ';';
    html += 'border:1px solid ' + (curr?'var(--success)':'var(--border)') + '">';
    html += '<span style="font-size:16px">' + (done?'✅':curr?'👉':'⏳') + '</span>';
    html += '<span style="font-size:13px;' + (done?'color:var(--text3);text-decoration:line-through':curr?'font-weight:700':'color:var(--text2)') + '">+' + escHtml(pasos[i]) + '</span>';
    if (curr) html += '<span class="badge badge-success" style="margin-left:auto">Actual</span>';
    if (done) html += '<span style="margin-left:auto;font-size:11px;color:var(--text3)">Enviado</span>';
    html += '</div>';
  }
  html += '</div>';
  html += '<div style="background:var(--surface2);border-radius:8px;padding:10px 12px;margin-bottom:14px;font-size:12px;color:var(--text2)">';
  html += '📱 Hacé click en <strong>Abrir WhatsApp</strong>, enviá el mensaje desde la app y volvé aquí para continuar.';
  html += '</div>';
  html += '<div style="display:flex;gap:10px;flex-wrap:wrap">';
  html += '<button class="btn btn-success" onclick="wsStepEnviar()">💬 Abrir WhatsApp +' + escHtml(num) + '</button>';
  if (total - step > 1) html += '<button class="btn btn-secondary btn-sm" onclick="wsStepSaltar()">Saltar</button>';
  html += '<button class="btn btn-secondary btn-sm" onclick="wsStepFinalizar()">✓ Finalizar</button>';
  html += '</div></div>';

  var panel = document.getElementById('panel-ws-steps');
  if (!panel) {
    panel = document.createElement('div');
    panel.id = 'panel-ws-steps';
    var content = document.getElementById('content');
    if (content) content.appendChild(panel); else document.body.appendChild(panel);
  }
  panel.innerHTML = html;
  panel.scrollIntoView({ behavior:'smooth', block:'start' });
}

function wsStepEnviar() {
  var num = (window._wsPasos || [])[window._wsStep || 0];
  if (num) window.open('https://wa.me/' + num + '?text=' + (window._wsMsg||''), '_blank');
  window._wsStep = (window._wsStep || 0) + 1;
  setTimeout(mostrarPanelWsSteps, 300);
}
function wsStepSaltar() {
  window._wsStep = (window._wsStep || 0) + 1;
  mostrarPanelWsSteps();
}
function wsStepFinalizar() {
  var panel = document.getElementById('panel-ws-steps');
  if (panel) panel.remove();
  toast('Envíos de WhatsApp finalizados', 'success', 4000);
  var dest = window._wsNavDestino || 'cotizaciones';
  window._wsNavDestino = null;
  navigate(dest);
}

// ── Helper: preparar y lanzar panel WS steps ──
async function ejecutarEnvioWsConSteps(data, wsSel, nombreArchivo, navDestino) {
  toast('Generando PDF...', 'info', 30000);
  const blob = data.tipoDoc === 'estado_cuenta'
    ? await rcGenerarPDFBlob(data)
    : await generarPDFBlob(data);
  if (!blob) return;
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = nombreArchivo;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(function(){ URL.revokeObjectURL(url); }, 3000);
  const perfil = getPerfilSync();
  const wsTpl = data.tipoDoc === 'estado_cuenta'
    ? 'Hola {cliente}! 👋\nTe enviamos el *Estado de Cuenta* con un saldo pendiente de *{total}*.\n\n{nota}\n📎 Adjunto encontrará el PDF.\n\n_{empresa}_'
    : (perfil.wsMensaje || 'Hola {cliente}! 👋\nTe enviamos la cotización *#{numero}* por *{total}*.\n\n{nota}\n📎 Adjunto encontrará el PDF.\n\n_{empresa}_');
  window._wsPasos = wsSel.map(function(n){ return n.replace(/\D/g,''); }).filter(Boolean);
  window._wsMsg   = encodeURIComponent(interpolateMsg(wsTpl, data, perfil));
  window._wsStep  = 0;
  window._wsNavDestino = navDestino || 'cotizaciones';
  mostrarPanelWsSteps();
}

function interpolateMsg(template, data, perfil) {
  return template
    .replace(/{numero}/g,  data.numero      || '')
    .replace(/{cliente}/g, data.clienteNombre || '')
    .replace(/{total}/g,   '$' + fmt(data.total))
    .replace(/{empresa}/g, perfil.empresa   || 'L&H')
    .replace(/{nota}/g,    data.nota        || '')
    .replace(/{fecha}/g,   fmtDate(data.fecha));
}

// Genera nombre de archivo según tipo de documento
function nombreArchivoDoc(data) {
  const cliente = (data.clienteNombre||'cliente').replace(/\s+/g,'-');
  if (data.tipoDoc === 'estado_cuenta') {
    return 'EstadoCuenta-' + cliente + '.pdf';
  }
  return 'Cotizacion-' + (data.numero||'') + '-' + cliente + '.pdf';
}

// Detecta si es dispositivo móvil real (no Windows/Mac/Linux desktop)
function isMobileDevice() {
  return /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
}

// Genera PDF, lo descarga y abre Outlook con TODOS los mails en el campo "Para"
async function enviarMail(data) {
  const perfil = getPerfilSync();
  toast('Generando PDF...', 'info', 30000);

  const blob = data.tipoDoc === 'estado_cuenta'
    ? await rcGenerarPDFBlob(data)
    : await generarPDFBlob(data);
  if (!blob) return;

  const nombreArchivo = nombreArchivoDoc(data);

  // En móvil usar Web Share API
  if (isMobileDevice() && navigator.share && navigator.canShare) {
    const file = new File([blob], nombreArchivo, { type: 'application/pdf' });
    if (navigator.canShare({ files: [file] })) {
      try {
        const tituloShare = data.tipoDoc === 'estado_cuenta' ? 'Estado de Cuenta' : `Cotización #${data.numero}`;
        await navigator.share({ files: [file], title: tituloShare });
        toast('Archivo compartido exitosamente ✓');
        return;
      } catch(e) { /* continuar */ }
    }
  }

  // Descargar PDF
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = nombreArchivo;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 3000);
  await new Promise(r => setTimeout(r, 800));

  // Todos los mails seleccionados separados por coma en el campo "Para"
  const mailsList = data.clienteMails?.length ? data.clienteMails
    : data.clienteMail ? [data.clienteMail] : [];
  const toField = mailsList.join(',');
  if (!toField) { toast('No hay mails configurados','error'); return; }

  let asuntoTpl, cuerpoTpl;
  if (data.tipoDoc === 'estado_cuenta') {
    asuntoTpl = 'Estado de Cuenta — {empresa}';
    cuerpoTpl = 'Estimado/a {cliente},\n\nAdjunto encontrará el Estado de Cuenta con un saldo pendiente de {total}.\n\nNota: el PDF fue descargado automáticamente — adjúntelo a este correo.\n\n{nota}\n\nSaludos,\n{empresa}';
  } else {
    asuntoTpl = perfil.mailAsunto || 'Cotización #{numero} — {empresa}';
    cuerpoTpl = perfil.mailCuerpo ||
      'Estimado/a {cliente},\n\nAdjunto encontrará la cotización #{numero} por un total de {total}.\n\nNota: el PDF fue descargado automáticamente — adjúntelo a este correo.\n\n{nota}\n\nSaludos,\n{empresa}';
  }

  const subject = encodeURIComponent(interpolateMsg(asuntoTpl, data, perfil));
  const body    = encodeURIComponent(interpolateMsg(cuerpoTpl, data, perfil));

  window.location.href = `mailto:${toField}?subject=${subject}&body=${body}`;
  toast(`PDF descargado ✓ — Correo abierto con ${mailsList.length} destinatario(s)`, 'info', 8000);
}

function buildDocHTML(data, perfil) {
  // Si no se pasa perfil, usar localStorage como fallback
  if (!perfil) perfil = getPerfilSync();

  // Paleta lila
  const C = {
    bg:        '#f4f0fa',   // fondo general lila suave
    header:    '#5c4d8a',   // encabezado violeta profundo
    headerDark:'#3e3168',   // gradiente oscuro del header
    accent:    '#9b7fd4',   // lila medio — acento
    accentLight:'#e8e0f7',  // lila muy claro — filas alternadas
    accentLine: '#b39ddb',  // línea decorativa
    white:     '#ffffff',
    rowEven:   '#ffffff',
    rowOdd:    '#f0ebfa',
    text:      '#1a1520',   // negro casi puro para texto principal
    textMid:   '#3d3550',   // texto secundario oscuro
    textLight: '#6b5f85',   // texto terciario
    border:    '#d9cfee',
    totalBg:   '#3e3168',
  };

  const rowsHtml = data.items.map((item, i) => {
    const base   = (item.precio||0) * (item.cantidad||1);
    const ivaAmt = item.iva ? base * 0.21 : 0;
    const total  = base + ivaAmt;
    return `<tr style="background:${i%2===0 ? C.rowEven : C.rowOdd}">
      <td style="padding:10px 16px;border:none;border-bottom:1px solid ${C.border};color:${C.textMid};font-size:12px">${escHtml(item.rubro||'')}</td>
      <td style="padding:10px 16px;border:none;border-bottom:1px solid ${C.border};color:${C.text};font-weight:600;font-size:12px">
        ${escHtml(item.descripcion||'')}
        ${item.obs ? `<div style="font-size:10.5px;color:${C.accent};font-weight:400;margin-top:2px">↳ ${escHtml(item.obs)}</div>` : ''}

// ── Genera PDF real usando jsPDF + html2canvas ──
async function generarPDFBlob(data) {
  // Cargar perfil desde Firestore (con logo) antes de generar
  const perfil = await getPerfilData();
  LS.set('perfil', [perfil]);

  return new Promise((resolve, reject) => {
    const wrapper = document.createElement('div');
    wrapper.style.cssText = 'position:fixed;left:-9999px;top:0;width:794px;background:#f4f0fa;z-index:-1';
    wrapper.innerHTML = buildDocHTML(data, perfil);
    // Quitar ID para no conflicto
    const inner = wrapper.querySelector('#preview-doc-inner');
    if (inner) inner.removeAttribute('id');
    document.body.appendChild(wrapper);

    setTimeout(async () => {
      try {
        const canvas = await html2canvas(wrapper, {
          scale: 2,
          useCORS: true,
          allowTaint: true,
          backgroundColor: '#ffffff',
          width: 794,
          windowWidth: 794
        });
        document.body.removeChild(wrapper);

        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF({ orientation:'portrait', unit:'mm', format:'a4' });
        const pageW = pdf.internal.pageSize.getWidth();
        const pageH = pdf.internal.pageSize.getHeight();
        const imgW = pageW;
        const imgH = (canvas.height * pageW) / canvas.width;

        let yPos = 0;
        let remainingH = imgH;
        let firstPage = true;

        while (remainingH > 0) {
          if (!firstPage) pdf.addPage();
          const sliceH = Math.min(pageH, remainingH);
          const sliceCanvas = document.createElement('canvas');
          sliceCanvas.width = canvas.width;
          sliceCanvas.height = (sliceH * canvas.width) / imgW;
          const ctx = sliceCanvas.getContext('2d');
          ctx.drawImage(canvas, 0, yPos * canvas.width / imgW, canvas.width, sliceCanvas.height, 0, 0, canvas.width, sliceCanvas.height);
          pdf.addImage(sliceCanvas.toDataURL('image/jpeg', 0.95), 'JPEG', 0, 0, imgW, sliceH);
          yPos += sliceH;
          remainingH -= sliceH;
          firstPage = false;
        }

        resolve(pdf.output('blob'));
      } catch(e) {
        if(document.body.contains(wrapper)) document.body.removeChild(wrapper);
        reject(e);
      }
    }, 200);
  });
}

// ── Descarga el PDF ──
async function descargarPDF(data) {
  const toastId = toast('Generando PDF...', 'info', 30000);
  try {
    const blob = await generarPDFBlob(data);
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `Cotizacion-${data.numero}-${(data.clienteNombre||'cliente').replace(/\s+/g,'-')}.pdf`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 3000);
    toast('PDF descargado correctamente ✓');
    return blob;
  } catch(e) {
    toast('Error generando PDF: ' + e.message, 'error');
    return null;
  }
}

async function updateEstado(id, estado) {
  const cot = cotizacionesList.find(c=>c.id===id);
  if (!cot) return;
  cot.estado = estado;
  await DB.save('cotizaciones', cot);
  toast('Estado actualizado');
}

async function editarCotizacion(id) {
  const cot = cotizacionesList.find(c=>c.id===id);
  if (!cot) return;
  presupItems = cot.items ? JSON.parse(JSON.stringify(cot.items)) : [];
  presupEditId = id;
  document.getElementById('page-title').textContent = 'Editar Cotización';
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  document.getElementById('nav-presupuestos')?.classList.add('active');
  await renderPresupuesto(cot);
}

async function imprimirById(id) {
  const cot = cotizacionesList.find(c=>c.id===id);
  if (!cot) return;
  const tmpDiv = document.createElement('div');
  tmpDiv.id='tmp-print-doc';
  tmpDiv.style.display='none';
  tmpDiv.innerHTML = buildDocHTML(cot);
  document.body.appendChild(tmpDiv);
  imprimirCotizacion(cot,'preview-doc-inner');
  setTimeout(()=>tmpDiv.remove(), 1000);
}

  if (!cot) return;

  // Agrupar artículos por rubro normalizado
  const rubrosMap = {};

  // Ordenar rubros: primero los del orden fijo, luego el resto alfabético
  const rubrosKeys = Object.keys(rubrosMap);
  rubrosKeys.sort((a,b) => {
    const ia = ORDEN_RUBROS.indexOf(a);

  const htmlContent = '<!DOCTYPE html><html><head><meta charset="UTF-8"><style>'

async function enviarMailById(id) {
  const cot = cotizacionesList.find(c=>c.id===id);
  if (!cot) return;
  // Recargar cliente fresco para tener mails actualizados
  const clientesFresh = await DB.getAll('clientes');
  const cf = clientesFresh.find(c => c.id === cot.clienteId) || {};
  const mails = Array.isArray(cf.mails) && cf.mails.length ? cf.mails : (cf.mail ? [cf.mail] : []);
  if (!mails.length) { toast('El cliente no tiene mail configurado','error'); return; }
  const data = {...cot, clienteMails: mails, clienteWsList: []};
  window._panelData   = data;
  window._panelModo   = 'mail';
  window._panelMails  = mails;
  window._panelWsList = [];
  abrirPanelSelectorDesdeTabla(data, 'mail', mails, [], id);
}

async function enviarWsById(id) {
  const cot = cotizacionesList.find(c=>c.id===id);
  if (!cot) return;
  const clientesFresh = await DB.getAll('clientes');
  const cf = clientesFresh.find(c => c.id === cot.clienteId) || {};
  const wsList = Array.isArray(cf.wsList) && cf.wsList.length ? cf.wsList : (cf.whatsapp ? [cf.whatsapp] : []);
  if (!wsList.length) { toast('El cliente no tiene WhatsApp configurado','error'); return; }
  const data = {...cot, clienteMails: [], clienteWsList: wsList};
  window._panelData   = data;
  window._panelModo   = 'ws';
  window._panelMails  = [];
  window._panelWsList = wsList;
  abrirPanelSelectorDesdeTabla(data, 'ws', [], wsList, id);
}

function abrirPanelSelectorDesdeTabla(data, modo, mails, wsList, cotId) {
  var needsMail = modo === 'mail' || modo === 'mailws';
  var needsWs   = modo === 'ws'   || modo === 'mailws';

  var html = '';
  html += '<div class="card" style="border:2px solid var(--accent);margin-top:12px">';
  html += '<div class="card-title">📤 Seleccionar Destinatarios — ' + escHtml(data.clienteNombre) + '</div>';

  if (needsMail) {
    html += '<div style="margin-bottom:16px">';
    html += '<div style="font-size:12px;font-weight:700;color:var(--info);margin-bottom:8px;text-transform:uppercase;letter-spacing:1px">📧 Direcciones de Mail</div>';
    for (var i = 0; i < mails.length; i++) {
      html += '<label style="display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:8px;background:var(--surface2);border:1px solid var(--border);margin-bottom:6px;cursor:pointer">';
      html += '<input type="checkbox" id="pnl-mail-' + i + '" checked style="width:18px;height:18px;accent-color:var(--info);cursor:pointer">';
      html += '<span style="font-size:14px">' + escHtml(mails[i]) + '</span>';
      html += '</label>';
    }
    html += '</div>';
  }

  if (needsWs) {
    html += '<div style="margin-bottom:16px">';
    html += '<div style="font-size:12px;font-weight:700;color:var(--success);margin-bottom:8px;text-transform:uppercase;letter-spacing:1px">💬 Números de WhatsApp</div>';
    for (var j = 0; j < wsList.length; j++) {
      html += '<label style="display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:8px;background:var(--surface2);border:1px solid var(--border);margin-bottom:6px;cursor:pointer">';
      html += '<input type="checkbox" id="pnl-ws-' + j + '" checked style="width:18px;height:18px;accent-color:var(--success);cursor:pointer">';
      html += '<span style="font-size:14px">' + escHtml(wsList[j]) + '</span>';
      html += '</label>';
    }
    html += '</div>';
  }

  html += '<div style="display:flex;gap:10px;margin-top:4px">';
  html += '<button class="btn btn-secondary" onclick="cerrarPanelEnvio()">Cancelar</button>';
  html += '<button class="btn btn-primary" onclick="confirmarPanelEnvioTabla(\'' + cotId + '\')">✓ Confirmar y Enviar</button>';
  html += '</div>';
  html += '</div>';

  // Insertar debajo de la tabla de cotizaciones
  var oldPanel = document.getElementById('panel-envio');
  if (oldPanel) oldPanel.remove();
  var panel = document.createElement('div');
  panel.id = 'panel-envio';
  panel.innerHTML = html;
  var content = document.getElementById('content');
  if (content) { content.appendChild(panel); panel.scrollIntoView({behavior:'smooth', block:'start'}); }
}

async function confirmarPanelEnvioTabla(cotId) {
  var data    = window._panelData;
  var modo    = window._panelModo;
  var mails   = window._panelMails  || [];
  var wsList  = window._panelWsList || [];
  if (!data) { toast('Error: datos perdidos','error'); return; }

  var needsMail = modo === 'mail' || modo === 'mailws';
  var needsWs   = modo === 'ws'   || modo === 'mailws';
  var mailsSel = [];
  var wsSel    = [];

  if (needsMail) {
    for (var i = 0; i < mails.length; i++) {
      var cb = document.getElementById('pnl-mail-' + i);
      if (cb && cb.checked) mailsSel.push(String(mails[i]));
    }
  }
  if (needsWs) {
    for (var j = 0; j < wsList.length; j++) {
      var cw = document.getElementById('pnl-ws-' + j);
      if (cw && cw.checked) wsSel.push(String(wsList[j]));
    }
  }

  cerrarPanelEnvio();

  if (mailsSel.length) {
    await enviarMail({...data, clienteMails: mailsSel});
    const cot = cotizacionesList.find(c=>c.id===cotId);
    if (cot) { cot.enviado = [...new Set([...(cot.enviado||[]),'mail'])]; await DB.save('cotizaciones', cot); }
  }
  if (wsSel.length) {
    const nombreArchivo = 'Cotizacion-' + data.numero + '-' + (data.clienteNombre||'').replace(/\s+/g,'-') + '.pdf';
    const cot = cotizacionesList.find(c=>c.id===cotId);
    if (cot) { cot.enviado = [...new Set([...(cot.enviado||[]),'whatsapp'])]; await DB.save('cotizaciones', cot); }
    await ejecutarEnvioWsConSteps(data, wsSel, nombreArchivo);
  }
}

async function deleteCotizacion(id) {
  if (!confirm('¿Eliminar esta cotización?')) return;
  await DB.delete('cotizaciones', id);
  cotizacionesList = cotizacionesList.filter(c=>c.id!==id);
  renderCotizaciones();
  toast('Cotización eliminada','info');
}

      .filter(r => r.tipo === 'factura')
      .sort((a,b) => (b.fecha||'').localeCompare(a.fecha||''));

    const estadosCots = {};
    rcData.filter(r=>r.tipo==='presupuesto').forEach(r=>{ estadosCots[r.refId]=r; });

    let totalPendiente = 0;
    cotsCliente.forEach(cot => {
      const est = estadosCots[cot.id];
      const estado = est?.estado || 'impago';
      if (estado === 'impago') totalPendiente += parseFloat(cot.total||0);
      if (estado === 'pago_parcial') totalPendiente += parseFloat(est?.saldoRestante||0);
    });
    facturas.forEach(f => {
      if (f.estado === 'impago') totalPendiente += parseFloat(f.saldo||0);
      if (f.estado === 'pago_parcial') totalPendiente += parseFloat(f.saldoRestante||0);
    });

    html += `
    <div class="card" id="rc-card-${cliente.id}">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:16px">
        <div>
          <div style="font-family:'DM Serif Display',serif;font-size:18px;color:var(--accent)">${escHtml(cliente.nombre)}</div>
          ${cliente.razonSocial?`<div style="font-size:12px;color:var(--text2)">${escHtml(cliente.razonSocial)}</div>`:''}
          ${cliente.cuit?`<div style="font-size:11px;color:var(--text3)">CUIT: ${escHtml(cliente.cuit)}</div>`:''}
        </div>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
          <div style="background:${totalPendiente>0?'rgba(224,92,106,0.15)':'rgba(82,200,122,0.12)'};border:1px solid ${totalPendiente>0?'rgba(224,92,106,0.4)':'rgba(82,200,122,0.3)'};border-radius:8px;padding:8px 16px;text-align:center">
            <div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1px">Saldo Pendiente</div>
            <div style="font-size:20px;font-weight:800;color:${totalPendiente>0?'var(--danger)':'var(--success)'}">$${fmt(totalPendiente)}</div>
          </div>
          <button class="btn btn-secondary btn-sm" onclick="rcAgregarFactura('${cliente.id}')">+ Factura</button>
          <button class="btn btn-primary btn-sm" onclick="rcGenerarReporte('${cliente.id}')">📄 Estado de Cuenta</button>

            <tbody>
              ${cotsCliente.map(cot => {
                const est = estadosCots[cot.id] || {};
                const estado = est.estado || 'impago';
                const saldoR = est.saldoRestante ?? cot.total;
                return `<tr>
                  <td><strong style="color:var(--accent)">${cot.numero}</strong></td>

                    <select class="form-control" style="padding:4px 8px;font-size:12px;width:130px"

                      <option value="pago_total" ${estado==='pago_total'?'selected':''}>🟢 Pago Total</option>

                          <span style="color:var(--text2);font-weight:600">$</span>
                          <input class="form-control" type="number" step="0.01" min="0"
                            value="${saldoR}" style="width:110px;padding:4px 8px;font-size:12px"
                            onchange="rcUpdateSaldoCot('${cliente.id}','${cot.id}',this.value)"

                    }
                  </td>
                  <td>
                    <input class="form-control" type="date" style="padding:4px 8px;font-size:12px;width:145px"
                      value="${est.fechaPago||''}"
                      onchange="rcUpdateFechaPagoCot('${cliente.id}','${cot.id}',this.value)">

                </tr>`;
              }).join('')}
            </tbody>
          </table>
        </div>
      </div>` : '<div style="font-size:12px;color:var(--text3);margin-bottom:10px">Sin presupuestos finalizados.</div>'}

      <!-- Facturas manuales -->

};

async function rcUpdateEstadoCot(clienteId, cotId, estado, total) {
  const arr = await DB.getAll('resumenItems_'+clienteId);
  let item = arr.find(r=>r.tipo==='presupuesto'&&r.refId===cotId);
  if (!item) item = { tipo:'presupuesto', refId:cotId };
  item.estado = estado;
  if (estado==='impago') item.saldoRestante = total;
  if (estado==='pago_total') item.saldoRestante = 0;
  await DB.save('resumenItems_'+clienteId, item);
  PAGES.resumen();
}

async function rcUpdateSaldoCot(clienteId, cotId, valor) {
  const arr = await DB.getAll('resumenItems_'+clienteId);
  const item = arr.find(r=>r.tipo==='presupuesto'&&r.refId===cotId);
  if (item) { item.saldoRestante = parseFloat(valor)||0; await DB.save('resumenItems_'+clienteId, item); }
  PAGES.resumen();
}

async function rcUpdateFechaPagoCot(clienteId, cotId, fecha) {
  const arr = await DB.getAll('resumenItems_'+clienteId);
  let item = arr.find(r=>r.tipo==='presupuesto'&&r.refId===cotId);
  if (!item) item = { tipo:'presupuesto', refId:cotId };
  item.fechaPago = fecha;
  await DB.save('resumenItems_'+clienteId, item);
}

async function rcUpdateEstadoFactura(clienteId, factId, estado, saldo) {
  const arr = await DB.getAll('resumenItems_'+clienteId);
  const item = arr.find(r=>r.id===factId);
  if (item) {
    item.estado = estado;
    if (estado==='impago') item.saldoRestante = saldo;
    if (estado==='pago_total') item.saldoRestante = 0;
    await DB.save('resumenItems_'+clienteId, item);
  }
  PAGES.resumen();
}

async function rcUpdateSaldoFactura(clienteId, factId, valor) {
  const arr = await DB.getAll('resumenItems_'+clienteId);
  const item = arr.find(r=>r.id===factId);
  if (item) { item.saldoRestante = parseFloat(valor)||0; await DB.save('resumenItems_'+clienteId, item); }
  PAGES.resumen();
}

async function rcUpdateFechaPagoFactura(clienteId, factId, fecha) {
  const arr = await DB.getAll('resumenItems_'+clienteId);
  const item = arr.find(r=>r.id===factId);
  if (item) { item.fechaPago = fecha; await DB.save('resumenItems_'+clienteId, item); }
}

function rcAgregarFactura(clienteId) {
  showModal(`
    <div class="modal-header">
      <div class="modal-title">+ Agregar Factura</div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="form-grid">
      <div class="form-grid form-grid-2">
        <div class="form-group"><label>N° Factura *</label><input class="form-control" id="fct-numero" placeholder="0001-00001234"></div>
