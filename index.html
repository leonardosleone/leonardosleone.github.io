      </div>
      <div class="form-grid form-grid-2">
        <div class="form-group"><label>Saldo *</label>
          <div style="display:flex;align-items:center;gap:6px">
            <span style="color:var(--text2);font-weight:700">$</span>
            <input class="form-control" type="number" step="0.01" id="fct-saldo" placeholder="0.00">
          </div>
        </div>
        <div class="form-group"><label>Fecha de Pago</label><input class="form-control" type="date" id="fct-fechapago"></div>
      </div>

      <button class="btn btn-primary" onclick="rcGuardarFactura('${clienteId}')">Guardar</button>

async function rcGuardarFactura(clienteId) {
  const numero    = document.getElementById('fct-numero').value.trim();
  const fecha     = document.getElementById('fct-fecha').value;
  const saldo     = parseFloat(document.getElementById('fct-saldo').value)||0;
  const fechaPago = document.getElementById('fct-fechapago').value;
  if (!numero) { toast('El número de factura es obligatorio','error'); return; }
  await DB.save('resumenItems_'+clienteId, {
    tipo: 'factura', numero, fecha, saldo, fechaPago,
    estado: fechaPago ? 'pago_total' : 'impago',
    saldoRestante: fechaPago ? 0 : saldo
  });
  closeModal();
  PAGES.resumen();
  toast('Factura agregada');
}

async function rcDeleteFactura(clienteId, factId) {
  if (!confirm('¿Eliminar esta factura?')) return;
  await DB.delete('resumenItems_'+clienteId, factId);
  PAGES.resumen();
  toast('Factura eliminada','info');
}

// ── Reporte DEUDA (solo pendientes) ──
async function rcGenerarReporte(clienteId) {
  const [clientes, cotizaciones] = await Promise.all([DB.getAll('clientes'), DB.getAll('cotizaciones')]);
  const cliente = clientes.find(c=>c.id===clienteId);
  if (!cliente) return;
  await getPerfilData().then(p=>{ if(p) LS.set('perfil',[p]); });

  const rcData = await DB.getAll('resumenItems_'+clienteId);
  const facturas = rcData.filter(r=>r.tipo==='factura');
  const estadosCots = {};
  rcData.filter(r=>r.tipo==='presupuesto').forEach(r=>{ estadosCots[r.refId]=r; });
  const cotFinalizadas = cotizaciones.filter(c=>c.clienteId===clienteId&&c.estado==='finalizado');

  const estLabel = (e) => e==='pago_total'?'🟢 Pago Total':e==='pago_parcial'?'🟡 Parcial':'🔴 Impago';

  const cotRows = cotFinalizadas
    .filter(c=>{ const e=estadosCots[c.id]?.estado||'impago'; return e!=='pago_total'; })
    .map(c=>{ const est=estadosCots[c.id]; return { numero:c.numero, fecha:c.fecha, total:c.total,
      estadoLabel:estLabel(est?.estado||'impago'), fechaPago:est?.fechaPago||'',
      saldo:est?.estado==='pago_parcial'?(est.saldoRestante||0):c.total, items:c.items||[] }; })
    .sort((a,b)=>(b.fecha||'').localeCompare(a.fecha||''));

  const factRows = facturas
    .filter(f=>f.estado!=='pago_total')
    .map(f=>({ numero:f.numero, fecha:f.fecha, total:f.saldo,
      estadoLabel:estLabel(f.estado), fechaPago:f.fechaPago||'',
      saldo:f.estado==='pago_parcial'?(f.saldoRestante||0):f.saldo }))
    .sort((a,b)=>(b.fecha||'').localeCompare(a.fecha||''));

  let totalPendiente = 0;
  cotRows.forEach(r=>totalPendiente+=r.saldo);
  factRows.forEach(r=>totalPendiente+=r.saldo);

  rcMostrarModal(clienteId, cliente, cotRows, factRows, totalPendiente,
    'ESTADO DE CUENTA', 'Al ' + fmtDate(today()));
}

async function rcGenerarHistorial(clienteId) {
  const desde = document.getElementById('hist-desde').value;
  const hasta = document.getElementById('hist-hasta').value;
  closeModal();

  const [clientes, cotizaciones] = await Promise.all([DB.getAll('clientes'), DB.getAll('cotizaciones')]);
  const cliente = clientes.find(c=>c.id===clienteId);
  if (!cliente) return;
  await getPerfilData().then(p=>{ if(p) LS.set('perfil',[p]); });

  const rcData = await DB.getAll('resumenItems_'+clienteId);
  const facturas = rcData.filter(r=>r.tipo==='factura');
  const estadosCots = {};
  rcData.filter(r=>r.tipo==='presupuesto').forEach(r=>{ estadosCots[r.refId]=r; });
  const cotFinalizadas = cotizaciones.filter(c=>c.clienteId===clienteId&&c.estado==='finalizado');

  const enRango = (fecha) => {
    if (!fecha) return true;
    if (desde && fecha < desde) return false;
    if (hasta && fecha > hasta) return false;
    return true;
  };

  const estLabel = (e) => e==='pago_total'?'🟢 Pago Total':e==='pago_parcial'?'🟡 Parcial':'🔴 Impago';

  const cotRows = cotFinalizadas
    .filter(c=>enRango(c.fecha))
    .map(c=>{ const est=estadosCots[c.id]; return { numero:c.numero, fecha:c.fecha, total:c.total,
      estadoLabel:estLabel(est?.estado||'impago'), fechaPago:est?.fechaPago||'',
      saldo:est?.estado==='pago_total'?0:est?.estado==='pago_parcial'?(est.saldoRestante||0):c.total, items:c.items||[] }; })
    .sort((a,b)=>(b.fecha||'').localeCompare(a.fecha||''));

  const factRows = facturas
    .filter(f=>enRango(f.fecha))
    .map(f=>({ numero:f.numero, fecha:f.fecha, total:f.saldo,
      estadoLabel:estLabel(f.estado), fechaPago:f.fechaPago||'',
      saldo:f.estado==='pago_total'?0:f.estado==='pago_parcial'?(f.saldoRestante||0):f.saldo }))
    .sort((a,b)=>(b.fecha||'').localeCompare(a.fecha||''));

  let totalPendiente = 0;
  cotRows.forEach(r=>totalPendiente+=r.saldo);
  factRows.forEach(r=>totalPendiente+=r.saldo);

  const periodo = (desde?'Desde '+fmtDate(desde)+' ':'') + (hasta?'hasta '+fmtDate(hasta):'');
  rcMostrarModal(clienteId, cliente, cotRows, factRows, totalPendiente,
    'HISTORIAL DE CUENTA', periodo || 'Historial completo');
}

// ── Genera el blob del PDF del Estado de Cuenta usando el HTML ya construido ──
async function rcGenerarPDFBlob(data) {
  const wrapper = document.createElement('div');
  wrapper.style.cssText = 'position:fixed;left:-9999px;top:0;width:794px;background:#f4f0fa;z-index:-1';
  wrapper.innerHTML = data._rcDocHTML || document.getElementById('preview-doc-inner')?.outerHTML || '';
  document.body.appendChild(wrapper);

  try {
    const canvas = await html2canvas(wrapper, { scale:2, useCORS:true, backgroundColor:'#f4f0fa', width:794, windowWidth:794 });
    document.body.removeChild(wrapper);
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ orientation:'portrait', unit:'mm', format:'a4' });
    const pageW = pdf.internal.pageSize.getWidth();
    const pageH = pdf.internal.pageSize.getHeight();
    const imgH = (canvas.height * pageW) / canvas.width;
    let yPos = 0, remaining = imgH, first = true;
    while (remaining > 0) {
      if (!first) pdf.addPage();
      const sliceH = Math.min(pageH, remaining);
      const sc = document.createElement('canvas');
      sc.width = canvas.width;
      sc.height = (sliceH * canvas.width) / pageW;
      sc.getContext('2d').drawImage(canvas, 0, yPos*canvas.width/pageW, canvas.width, sc.height, 0, 0, canvas.width, sc.height);
      pdf.addImage(sc.toDataURL('image/jpeg',0.95),'JPEG',0,0,pageW,sliceH);
      yPos += sliceH; remaining -= sliceH; first = false;
    }
    return pdf.output('blob');
  } catch(e) {
    if(document.body.contains(wrapper)) document.body.removeChild(wrapper);
    toast('Error generando PDF: ' + e.message, 'error');
    return null;
  }
}

// ── Botón "Descargar PDF" del modal de Estado de Cuenta ──
async function rcDescargarPDF() {
  const data = window._previewData;
  if (!data) { toast('Error: sin datos','error'); return; }
  toast('Generando PDF...', 'info', 30000);
  const blob = await rcGenerarPDFBlob(data);
  if (!blob) return;
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = nombreArchivoDoc(data);
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url), 3000);
  toast('PDF descargado ✓');
}

function abrirPanelEnvioRC(modo, mails, wsList) {
  var needsMail = modo === 'mail' || modo === 'mailws';
  var needsWs   = modo === 'ws'   || modo === 'mailws';
  var html = '';
  html += '<div style="margin-top:14px;padding:16px;background:var(--surface2);border:2px solid var(--accent);border-radius:10px">';
  html += '<div style="font-size:13px;font-weight:700;color:var(--accent);margin-bottom:12px">📤 Seleccionar Destinatarios</div>';

  if (needsMail) {
    html += '<div style="margin-bottom:12px"><div style="font-size:11px;font-weight:700;color:var(--info);margin-bottom:8px;text-transform:uppercase;letter-spacing:1px">📧 Mails</div>';
    for (var i = 0; i < mails.length; i++) {
      html += '<label style="display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:7px;background:var(--surface);border:1px solid var(--border);margin-bottom:5px;cursor:pointer">';
      html += '<input type="checkbox" id="rc-mail-' + i + '" checked style="width:16px;height:16px;accent-color:var(--info);cursor:pointer">';
      html += '<span style="font-size:13px">' + escHtml(mails[i]) + '</span></label>';
    }
    html += '</div>';
  }

  if (needsWs) {
    html += '<div style="margin-bottom:12px"><div style="font-size:11px;font-weight:700;color:var(--success);margin-bottom:8px;text-transform:uppercase;letter-spacing:1px">💬 WhatsApp</div>';
    for (var j = 0; j < wsList.length; j++) {
      html += '<label style="display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:7px;background:var(--surface);border:1px solid var(--border);margin-bottom:5px;cursor:pointer">';
      html += '<input type="checkbox" id="rc-ws-' + j + '" checked style="width:16px;height:16px;accent-color:var(--success);cursor:pointer">';
      html += '<span style="font-size:13px">' + escHtml(wsList[j]) + '</span></label>';
    }
    html += '</div>';
  }

  html += '<div style="display:flex;gap:8px">';
  html += '<button class="btn btn-secondary btn-sm" onclick="document.getElementById(\'panel-envio-rc\').innerHTML=\'\'">Cancelar</button>';
  html += '<button class="btn btn-primary btn-sm" onclick="confirmarEnvioRC()">✓ Confirmar y Enviar</button>';
  html += '</div></div>';

  var panel = document.getElementById('panel-envio-rc');
  if (panel) panel.innerHTML = html;
}

async function confirmarEnvioRC() {
  var data    = window._panelData;
  var modo    = window._panelModo;
  var mails   = window._panelMails  || [];
  var wsList  = window._panelWsList || [];
  if (!data) { toast('Error: datos perdidos','error'); return; }

  var needsMail = modo === 'mail' || modo === 'mailws';
  var needsWs   = modo === 'ws'   || modo === 'mailws';
  var mailsSel  = [];
  var wsSel     = [];

  if (needsMail) {
    for (var i = 0; i < mails.length; i++) {
      var cb = document.getElementById('rc-mail-' + i);
      if (cb && cb.checked) mailsSel.push(String(mails[i]));
    }
  }
  if (needsWs) {
    for (var j = 0; j < wsList.length; j++) {
      var cw = document.getElementById('rc-ws-' + j);
      if (cw && cw.checked) wsSel.push(String(wsList[j]));
    }
  }

  // Cerrar panel
  var panel = document.getElementById('panel-envio-rc');
  if (panel) panel.innerHTML = '';

  // Enviar mail
  if (mailsSel.length) {
    await enviarMail({...data, clienteMails: mailsSel});
  }

  // Enviar WhatsApp — abrir todas las ventanas juntas
  if (wsSel.length) {
    toast('Generando PDF...', 'info', 30000);
    const nombreArchivo = 'EstadoCuenta-' + (data.clienteNombre||'cliente').replace(/\s+/g,'-') + '.pdf';
    await ejecutarEnvioWsConSteps(data, wsSel, nombreArchivo, 'resumen');
  }
}

  };
  await DB.save('perfil', doc);
  // Sincronizar siempre a localStorage para que getPerfilSync lo tenga disponible
  LS.set('perfil', [doc]);
  toast('Perfil guardado exitosamente!');
}

function exportarBackup() {
  const data = {};
  ['articulos','cotizaciones','clientes','perfil'].forEach(col=>{
    data[col] = LS.get(col,[]);
  });
  const blob = new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `leosys-backup-${today()}.json`;
  a.click();
  toast('Backup exportado');
}

function importarBackup(input) {
  const file = input.files[0]; if(!file) return;
  if(!confirm('¿Importar backup? Esto sobreescribirá todos los datos actuales.')) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      ['articulos','cotizaciones','clientes','perfil'].forEach(col=>{
        if(data[col]) LS.set(col, data[col]);
      });
      toast('Backup importado exitosamente! Recargá la página.');
    } catch(err) {
      toast('Error al importar backup: '+err.message,'error');
    }
  };
  reader.readAsText(file);
}

    accent: '#c9a84c',

  },
  claro: {
    nombre: 'Claro',
    icon: '☀️',
    bg: '#f0f2f7',
    surface: '#ffffff',

    text: '#1a1d2e',

function renderThemePicker() {
  const picker = document.getElementById('theme-picker');
  if (!picker) return;
  const current = localStorage.getItem('leosys_tema') || 'negro';
  picker.innerHTML = Object.entries(TEMAS).map(([key, t]) => `
    <div onclick="setTema('${key}')" style="
      cursor:pointer;
      border-radius:12px;
      border:2px solid ${current===key ? t.accent : t.border};
      overflow:hidden;
      transition:all .2s;
      transform:${current===key?'scale(1.03)':'scale(1)'};
      box-shadow:${current===key?`0 0 0 3px ${t.accent}33`:'none'};
    ">
      <!-- mini preview -->
      <div style="height:72px;background:${t.bg};display:flex;gap:0;overflow:hidden">
        <!-- sidebar simulado -->
        <div style="width:36px;background:${t.surface};border-right:1px solid ${t.border};display:flex;flex-direction:column;padding:6px 4px;gap:4px">
          ${[1,2,3,4].map(()=>`<div style="height:5px;border-radius:3px;background:${t.border}"></div>`).join('')}
        </div>
        <!-- content simulado -->
        <div style="flex:1;padding:6px;display:flex;flex-direction:column;gap:4px">
          <div style="height:8px;border-radius:3px;background:${t.surface};width:60%"></div>
          <div style="flex:1;border-radius:5px;background:${t.surface};border:1px solid ${t.border};display:flex;flex-direction:column;gap:3px;padding:5px">
            <div style="height:5px;border-radius:2px;background:${t.accent};width:40%"></div>
            <div style="height:4px;border-radius:2px;background:${t.border};width:80%"></div>
            <div style="height:4px;border-radius:2px;background:${t.border};width:60%"></div>
          </div>
        </div>
      </div>
      <!-- label -->
      <div style="background:${t.surface};padding:8px 10px;border-top:1px solid ${t.border}">
        <div style="display:flex;align-items:center;justify-content:space-between">
          <div>
            <div style="font-size:13px;font-weight:600;color:${t.text}">${t.icon} ${t.nombre}</div>
            <div style="font-size:10px;color:${t.text}88;margin-top:2px;line-height:1.3">${t.desc}</div>
          </div>
          ${current===key ? `<div style="width:18px;height:18px;border-radius:50%;background:${t.accent};display:flex;align-items:center;justify-content:center;font-size:11px;color:#000;font-weight:700;flex-shrink:0">✓</div>` : ''}
        </div>
      </div>
    </div>
  `).join('');
}

function setTema(tema) {
  localStorage.setItem('leosys_tema', tema);
  document.documentElement.setAttribute('data-theme', tema);
  renderThemePicker();
  toast(`Tema "${TEMAS[tema]?.nombre}" aplicado`);
}

function loadTema() {
  const tema = localStorage.getItem('leosys_tema') || 'negro';
  document.documentElement.setAttribute('data-theme', tema);
}

loadTema();
